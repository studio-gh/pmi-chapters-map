// ── Stats row ─────────────────────────────────────────────────────────────────
function renderStats(region) {
  const row = document.getElementById("stats-row");
  row.innerHTML = "";
  const addSep = () => { const s = document.createElement("div"); s.className = "stat-sep"; row.appendChild(s); };
  if (region === "all") {
    const counts = {};
    CHAPTERS.forEach(c => { counts[c.r] = (counts[c.r]||0)+1; });
    ["North America","Europe","Latin America","Sub-Saharan Africa","Asia Pacific","South Asia","Middle East and North Africa"].forEach((r,i) => {
      if (!counts[r]) return;
      if (i > 0) addSep();
      const cfg = REGIONS[r];
      const el = document.createElement("div"); el.className = "stat-item";
      el.innerHTML = `<div class="stat-pip" style="background:${cfg.color}"></div><span class="stat-label">${cfg.label}</span><span class="stat-count">${counts[r]}</span>`;
      row.appendChild(el);
    });
  } else {
    const filtered = CHAPTERS.filter(c => c.r === region);
    const cc = {};
    filtered.forEach(c => { cc[c.co] = (cc[c.co]||0)+1; });
    Object.entries(cc).sort((a,b)=>b[1]-a[1]).forEach(([country,count],i) => {
      if (i > 0) addSep();
      const el = document.createElement("div"); el.className = "stat-item";
      el.innerHTML = `<div class="stat-pip" style="background:${REGIONS[region].color}"></div><span class="stat-label">${country}</span><span class="stat-count">${count}</span>`;
      row.appendChild(el);
    });
    const summary = document.createElement("span"); summary.className = "region-summary";
    summary.textContent = `${filtered.length} chapters · ${Object.keys(cc).length} countries`;
    row.appendChild(summary);
  }
  row.appendChild(buildToggle());
  document.getElementById("state-toggle").checked = showStateLines;
  const cnt = document.getElementById("country-name-toggle");
  if (cnt) cnt.checked = showCountryNames;
  const cht = document.getElementById("chapter-highlight-toggle");
  if (cht) cht.checked = showChapterHighlights;
}

// ── Region zoom bounds ────────────────────────────────────────────────────────
const REGION_BOUNDS = {
  "North America":[-175,14,-50,72],"Latin America":[-120,-56,-33,33],
  "Europe":[-25,34,50,72],"Middle East and North Africa":[-14,20,62,42],
  "Sub-Saharan Africa":[-20,-36,52,18],"South Asia":[60,4,100,38],"Asia Pacific":[95,-48,180,52],
};

let mapSvg, mapProjection, mapW, mapH, mapLayersGroup, geoPath;

function zoomToRegion(region) {
  if (!mapSvg || !mapProjection) return;
  let tx, ty, scale;
  if (region === "all") {
    tx=mapW/2; ty=mapH/2; scale=mapW/6.3;
  } else {
    const b=REGION_BOUNDS[region]; if(!b)return;
    const [lonMin,latMin,lonMax,latMax]=b;
    const pts=[mapProjection([lonMin,latMax]),mapProjection([lonMax,latMax]),mapProjection([lonMin,latMin]),mapProjection([lonMax,latMin])].filter(Boolean);
    if(!pts.length)return;
    const x0=Math.min(...pts.map(p=>p[0])),x1=Math.max(...pts.map(p=>p[0]));
    const y0=Math.min(...pts.map(p=>p[1])),y1=Math.max(...pts.map(p=>p[1]));
    const baseScale=mapW/6.3;
    scale=baseScale*Math.min((mapW-96)/(x1-x0),(mapH-96)/(y1-y0))*0.92;
    const cx=(x0+x1)/2,cy=(y0+y1)/2;
    const [ox,oy]=mapProjection.translate();
    tx=mapW/2+(ox-cx)*(scale/baseScale);
    ty=mapH/2+(oy-cy)*(scale/baseScale);
  }
  const t=d3.transition().duration(700).ease(d3.easeCubicInOut);
  mapLayersGroup.transition(t).attr("transform",`translate(${tx-mapW/2},${ty-mapH/2}) scale(${scale/(mapW/6.3)})`);
  const ds=(mapW/6.3)/scale;
  mapLayersGroup.node().__dotScale=ds;
  dotsGroup.selectAll("circle").transition(t)
    .attr("r",d=>(activeRegion==="all"||d.r===activeRegion?5:3.5)*ds)
    .attr("stroke-width",1.2*ds);
  if(labelsGroup){labelsGroup.attr("font-size",(7*ds)+"px");}
}

// ── Country opacity on region select ────────────────────────────────────────
function applyCountryOpacity(region) {
  if (!countryPaths) return;
  const t = d3.transition().duration(400).ease(d3.easeCubicOut);
  if (region === "all") {
    countryPaths.transition(t).attr("opacity", 1);
    d3.selectAll(".small-nation-marker").transition(t).attr("opacity", 0.55);
    // small-nation-label now in labelsGroup — toggle controlled
  } else {
    countryPaths.transition(t).attr("opacity", d => {
      const iso = String(d.id).padStart(3, "0");
      const cr = ISO_TO_REGION[iso];
      // Only highlight countries explicitly mapped to the selected region.
      // Unmapped territories (no ISO entry) dim with everyone else.
      if (cr === region) return 1;
      return 0.25;
    });

  }
}

// ── Hash-based region routing ─────────────────────────────────────────────────
function regionToHash(region) {
  if (region === "all") return "#all";
  return "#" + region.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
}
function hashToRegion(hash) {
  const slug = (hash || "").replace("#", "");
  if (!slug || slug === "all") return "all";
  return REGION_ORDER.find(r => regionToHash(r) === "#" + slug) || "all";
}

function setRegion(region) {
  activeRegion = region;
  // Update URL hash for shareable links (suppress hashchange re-fire)
  const newHash = regionToHash(region);
  if (window.location.hash !== newHash) {
    history.replaceState(null, "", newHash);
  }
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.region === region));
  const titleEl = document.getElementById("map-title");
  const headerCount = document.getElementById("header-count");
  const headerLabel = document.getElementById("header-label");
  if (region === "all") {
    const total = CHAPTERS.length;
    titleEl.textContent = `All chapters — ${total}`;
    headerCount.textContent = total;
    headerLabel.textContent = "chapters";
  } else {
    const count = CHAPTERS.filter(c => c.r === region).length;
    titleEl.textContent = `${REGIONS[region].label} — ${count} chapters`;
    headerCount.textContent = count;
    headerLabel.textContent = `chapters · ${REGIONS[region].label}`;
  }
  if (dotsGroup) {
    dotsGroup.selectAll("circle").each(function(d) {
      const active = region === "all" || d.r === region;
      d3.select(this).classed("dimmed", !active).attr("opacity", active ? 0.88 : 0.12);
    });
  }
  applyCountryOpacity(region);
  zoomToRegion(region);
  renderStats(region);
  syncTableToRegion(region);
}

// ── Export PNG ────────────────────────────────────────────────────────────────
function exportPNG() {
  const btn=document.getElementById("export-btn");
  btn.classList.add("loading");btn.textContent="Exporting…";
  const svgEl=document.getElementById("map-svg");
  const bbox=svgEl.getBoundingClientRect();
  const scale=2,W=Math.round(bbox.width*scale),H=Math.round(bbox.height*scale);
  const svgClone=svgEl.cloneNode(true);
  svgClone.setAttribute("width",W);svgClone.setAttribute("height",H);svgClone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const styleEl=document.createElementNS("http://www.w3.org/2000/svg","style");
  styleEl.textContent=`.country{fill:#efedf3;stroke:#b465ff;stroke-width:${0.5*scale};}.country.has-chapter{fill:#200f3b;}.graticule{fill:none;stroke:rgba(180,101,255,0.1);stroke-width:${0.4*scale};}.state-line{fill:none;stroke:#b465ff;stroke-width:${0.25*scale};opacity:0.6;}.state-line.hidden{display:none;}.chapter-dot.dimmed{opacity:0.12;}`;
  svgClone.insertBefore(styleEl,svgClone.firstChild);
  const url=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(svgClone)],{type:"image/svg+xml;charset=utf-8"}));
  const img=new Image();
  img.onload=()=>{const canvas=document.createElement("canvas");canvas.width=W;canvas.height=H;canvas.getContext("2d").drawImage(img,0,0,W,H);URL.revokeObjectURL(url);canvas.toBlob(blob=>{const a=document.createElement("a");const slug=activeRegion==="all"?"world":activeRegion.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");a.download=`pmi-chapters-${slug}.png`;a.href=URL.createObjectURL(blob);a.click();URL.revokeObjectURL(a.href);btn.classList.remove("loading");btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 6l2.5 2.5L9 6M2 10.5h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Export PNG`;},"image/png");};
  img.onerror=()=>{btn.classList.remove("loading");btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 6l2.5 2.5L9 6M2 10.5h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Export PNG`;alert("Export failed.");};
  img.src=url;
}

  const container=document.querySelector(".map-container");

    .attr("fill","none").attr("stroke","rgba(180,101,255,0.1)").attr("stroke-width",0.4).attr("d",path);

  const moroccoMerged = topojson.merge(world, world.objects.countries.geometries.filter(g=>
    String(g.id)==="504"||String(g.id)==="732"
  ));

  // Remove both originals, inject merged feature
  countries.features = countries.features.filter(f=>String(f.id)!=="504"&&String(f.id)!=="732");
  const mergedFeature = {type:"Feature",id:"504",geometry:moroccoMerged,_hasChapter:true,_region:"Middle East and North Africa"};

  })();

  stateLinesGroup.selectAll(".state-line").classed("hidden",!showStateLines);

  // ── Chapter dots ──────────────────────────────────────────────────────────
  dotsGroup=mapLayersGroup.append("g");
  dotsGroup.selectAll("circle").data(CHAPTERS).join("circle")
    .attr("class","chapter-dot")
    .attr("cx",d=>{const p=mapProjection([d.lon,d.lat]);return p?p[0]:-999;})
    .attr("cy",d=>{const p=mapProjection([d.lon,d.lat]);return p?p[1]:-999;})
    .attr("r",5).attr("fill",d=>REGIONS[d.r]?.color||"#4f17a8")
    .attr("opacity",0.88).attr("stroke","#ffffff").attr("stroke-width",1.2)

    .on("mousemove",moveTip)
    .on("click",function(evt,d){
      hideTip();
      if(!tableData.find(c=>c.n===d.n)){tableData=[...CHAPTERS];document.getElementById('table-search').value='';}

      const idx=sorted.findIndex(c=>c.n===d.n);
      if(idx>=0)tablePage=Math.floor(idx/PAGE_SIZE)+1;
      selectChapter(d);renderTable();
      document.querySelector('.table-card').scrollIntoView({behavior:'smooth',block:'nearest'});
    })
    .on("mouseleave",function(evt,d){
      const active=activeRegion==="all"||d.r===activeRegion;
      const ds=mapLayersGroup.node().__dotScale||1;
      d3.select(this).attr("r",(active?5:3.5)*ds).attr("stroke-width",1.2*ds);
      hideTip();

  // Maldives: rendered like a no-chapter country — Violet 50 fill, Violet 300 stroke
  const smallNationsGroup = mapLayersGroup.append("g").attr("class","small-nations-group");
  const SMALL_NATIONS = [
    { name:"Maldives", lon:73.5, lat:3.2 }
  ];
  SMALL_NATIONS.forEach(sn => {
    const ptCenter = mapProjection([sn.lon, sn.lat]);
    if (!ptCenter) return;

    // Maldives atoll chain: vertical series of small ellipses
    // Each entry: [lon offset, lat, rx, ry] — approximating major atolls
    const atolls = [
      [0,    6.9,  1.4, 0.9],
      [0,    6.1,  1.1, 0.7],
      [0,    5.5,  1.0, 0.7],
      [0,    4.8,  1.2, 0.8],
      [0,    4.1,  1.0, 0.6],

      [0,    2.0,  1.4, 0.9],
      [0,    1.2,  1.2, 0.8],
      [0,    0.4,  1.0, 0.7],
      [0,   -0.4,  1.2, 0.8],
    ];

    atolls.forEach(([dlon, lat, rx, ry]) => {
      const pt = mapProjection([sn.lon + dlon, lat]);
      if (!pt) return;
      smallNationsGroup.append("ellipse")
        .attr("cx", pt[0]).attr("cy", pt[1])
        .attr("rx", rx).attr("ry", ry)
        .attr("fill", "#efedf3")
        .attr("stroke", "#b465ff")
        .attr("stroke-width", 0.5)
        .attr("class", "small-nation-marker")
        .style("pointer-events","none");
    });

    // Label to the right of the chain, vertically centered — only in labelsGroup
    if (labelsGroup) {
      const ptLabel = mapProjection([sn.lon + 1.8, 3.2]);
      if (ptLabel) {
        labelsGroup.append("text")
          .attr("x", ptLabel[0])
          .attr("y", ptLabel[1])
          .attr("text-anchor","start")
          .attr("dominant-baseline","middle")
          .attr("font-size","7px")
          .attr("fill","rgba(32,15,59,0.45)")
          .attr("pointer-events","none")
          .attr("class","country-label small-nation-label")
          .text(sn.name);
      }
    }
  });

  document.getElementById("loading").style.display="none";

  const initialRegion = hashToRegion(window.location.hash);

  const mc=document.querySelector(".map-container");
  let drag={active:false,startX:0,startY:0,startTx:0,startTy:0};
  function gTrans(){const t=mapLayersGroup.attr("transform")||"";const m=t.match(/translate\(([^,]+),\s*([^)]+)\)/);return m?[parseFloat(m[1]),parseFloat(m[2])]:[0,0];}

  mc.addEventListener("mousedown",e=>{if(e.button!==0)return;drag.active=true;drag.startX=e.clientX;drag.startY=e.clientY;[drag.startTx,drag.startTy]=gTrans();mc.classList.add("dragging");e.preventDefault();});

const REGION_COLORS=Object.fromEntries(Object.entries(REGIONS).filter(([k])=>k!=='all').map(([k,v])=>[k,v.color]));
function hexToRgba(hex,a){return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;}
function sortTable(key){if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}document.querySelectorAll('.chapter-table th').forEach(th=>th.classList.remove('sorted'));const thMap={n:'th-n',r:'th-r',co:'th-co',st:'th-st',ci:'th-ci'};if(thMap[key]){const th=document.getElementById(thMap[key]);th.classList.add('sorted');th.querySelector('.sort-icon').textContent=sortDir===1?'↑':'↓';}renderTable();}
function onSearchInput(){const q=document.getElementById('table-search').value.trim().toLowerCase();tableData=q?CHAPTERS.filter(c=>c.n.toLowerCase().includes(q)||c.co.toLowerCase().includes(q)||c.ci.toLowerCase().includes(q)||c.r.toLowerCase().includes(q)||c.st.toLowerCase().includes(q)):[...CHAPTERS];tablePage=1;renderTable();}
function syncTableToRegion(region){tableData=region==='all'?[...CHAPTERS]:CHAPTERS.filter(c=>c.r===region);tablePage=1;document.getElementById('table-search').value='';renderTable();}

function renderTable(){
  const sorted=[...tableData].sort((a,b)=>{const av=(a[sortKey]||'').toLowerCase(),bv=(b[sortKey]||'').toLowerCase();return av<bv?-sortDir:av>bv?sortDir:0;});
  const total=sorted.length,totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  tablePage=Math.min(tablePage,totalPages);
  const start=(tablePage-1)*PAGE_SIZE,page=sorted.slice(start,start+PAGE_SIZE);
  document.querySelector('.table-title').textContent=activeRegion==='all'?'All chapters':(REGIONS[activeRegion]?.label||activeRegion);
  document.getElementById('table-count').textContent=`${total} chapter${total!==1?'s':''}`;
  const tbody=document.getElementById('table-body');tbody.innerHTML='';
  page.forEach(ch=>{
    const color=REGION_COLORS[ch.r]||'#4f17a8';
    const tr=document.createElement('tr');tr.dataset.name=ch.n;
    if(selectedChapter&&selectedChapter.n===ch.n)tr.classList.add('selected');
    tr.innerHTML=`<td class="name-cell">${ch.n}</td><td><span class="region-pill" style="background:${hexToRgba(color,0.12)};color:${color}">${ch.r}</span></td><td>${ch.co}</td><td>${ch.st||'—'}</td><td>${ch.ci}</td><td class="url-cell">${ch.url?`<a href="${ch.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Visit ↗</a>`:'—'}</td>`;
    tr.addEventListener('click',()=>selectChapter(ch));tbody.appendChild(tr);
  });
  document.getElementById('page-info').textContent=`Showing ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}`;
  const btns=document.getElementById('page-btns');btns.innerHTML='';
  const addBtn=(label,pg,isCurrent,disabled)=>{const b=document.createElement('button');b.className='page-btn'+(isCurrent?' current':'');b.textContent=label;b.disabled=disabled;if(!disabled&&!isCurrent)b.addEventListener('click',()=>{tablePage=pg;renderTable();});btns.appendChild(b);};
  addBtn('‹',tablePage-1,false,tablePage===1);
  pageRange(tablePage,totalPages).forEach(p=>{if(p==='…'){const s=document.createElement('span');s.textContent='…';s.style.cssText='padding:0 4px;color:rgba(32,15,59,0.3)';btns.appendChild(s);}else addBtn(p,p,p===tablePage,false);});
  addBtn('›',tablePage+1,false,tablePage===totalPages);
}
function pageRange(cur,total){if(total<=7)return Array.from({length:total},(_,i)=>i+1);if(cur<=4)return[1,2,3,4,5,'…',total];if(cur>=total-3)return[1,'…',total-4,total-3,total-2,total-1,total];return[1,'…',cur-1,cur,cur+1,'…',total];}

function selectChapter(ch){
  selectedChapter=ch;
  document.querySelectorAll('#table-body tr').forEach(tr=>tr.classList.toggle('selected',tr.dataset.name===ch.n));
  if(dotsGroup){dotsGroup.selectAll('circle').each(function(d){const ds=mapLayersGroup.node().__dotScale||1;if(d.n===ch.n){d3.select(this).raise().attr('stroke','#fff').attr('stroke-width',3*ds).attr('r',9*ds).attr('opacity',1);d3.select(this).transition().duration(300).attr('r',7*ds).transition().duration(150).attr('r',9*ds).transition().duration(200).attr('r',7*ds);}else{const active=activeRegion==='all'||d.r===activeRegion;d3.select(this).attr('r',(active?5:3.5)*ds).attr('stroke-width',1.2*ds).attr('opacity',active?0.88:0.12);}});}
  if(mapProjection&&mapLayersGroup){const pt=mapProjection([ch.lon,ch.lat]);if(pt){const sc=parseFloat((mapLayersGroup.attr('transform')||'').match(/scale\(([^)]+)\)/)?.[1]||1);const[ox,oy]=mapProjection.translate();const tx=mapW/2+(ox-pt[0])*sc,ty=mapH/2+(oy-pt[1])*sc;mapLayersGroup.transition().duration(500).ease(d3.easeCubicInOut).attr('transform',`translate(${tx-mapW/2},${ty-mapH/2}) scale(${sc})`);}}
}

let currentZoomScale=1;
function manualZoom(f){currentZoomScale=Math.max(0.5,Math.min(currentZoomScale*f,20));applyZoom();}
function resetZoom(){currentZoomScale=1;applyZoom(true);}
function applyZoom(reset){
  if(!mapLayersGroup)return;
  const t=mapLayersGroup.attr('transform')||'';
  const m=t.match(/translate\(([^,]+),\s*([^)]+)\)/);
  const tx=reset?0:(m?parseFloat(m[1]):0),ty=reset?0:(m?parseFloat(m[2]):0);
  const ds=1/currentZoomScale;mapLayersGroup.node().__dotScale=ds;
  const tr=d3.transition().duration(300).ease(d3.easeCubicOut);
  mapLayersGroup.transition(tr).attr('transform',`translate(${tx},${ty}) scale(${currentZoomScale})`);
  dotsGroup.selectAll('circle').transition(tr).attr('r',d=>(activeRegion==='all'||d.r===activeRegion?5:3.5)*ds).attr('stroke-width',1.2*ds);
}

async function loadPublishedContent() {
  try {
    const response = await fetch('/api/content', { cache: 'no-store' });
    if (!response.ok) return;
    const payload = await response.json();
    const content = payload.content;
    if (!content || !Array.isArray(content.chapters) || !content.chapters.length) return;

    CHAPTERS.splice(0, CHAPTERS.length, ...content.chapters);
    tableData = [...CHAPTERS];

    const copy = content.copy || {};
    const setText = (id, value) => {
      if (typeof value !== 'string' || !value.trim()) return;
      const element = document.getElementById(id);
      if (element) element.textContent = value;
    };
    setText('page-eyebrow', copy.eyebrow);
    setText('page-heading', copy.heading);
    setText('map-title', copy.defaultMapTitle);
    setText('legend-with', copy.legendWithChapters);
    setText('legend-without', copy.legendWithoutChapters);
    const search = document.getElementById('table-search');
    if (search && copy.searchPlaceholder) search.placeholder = copy.searchPlaceholder;
    const tableTitle = document.querySelector('.table-title');
    if (tableTitle && copy.tableTitle) tableTitle.textContent = copy.tableTitle;
    document.getElementById('header-count').textContent = String(CHAPTERS.length);
  } catch (_) {
    // The embedded active chapter list remains available as an offline fallback.
  }
}

// Hidden admin trigger: five quick clicks on the PMI eyebrow. Authentication
// and authorization are enforced server-side on the admin page and write API.
(() => {
  const trigger = document.getElementById('page-eyebrow');
  if (!trigger) return;
  let clicks = [];
  trigger.addEventListener('click', () => {
    const now = Date.now();
    clicks = clicks.filter(timestamp => now - timestamp < 1800);
    clicks.push(now);
    if (clicks.length >= 5) window.location.assign('/admin');
  });
})();

loadPublishedContent().finally(() => {
  initMap().then(() => { renderTable(); });
});

</script></body></html>
